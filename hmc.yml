---
#################################################
# STEP 1 — Attach Storage Group on HMC
#################################################

- name: Attach storage group and extract device numbers
  hosts: my_hmc_list
  gather_facts: no

  vars_files:
    - vault.yml

  vars:
    lpar_name: "{{ lpar_name }}"
    storage_group: 12345

  tasks:

    - name: Attach storage group
      ibm.ibm_zhmc.zhmc_storage_group_attachment:
        hmc_host: "{{ inventory_hostname }}"
        hmc_auth: "{{ hmc_auth }}"
        cpc_name: "{{ cpc_name }}"
        partition_name: "{{ lpar_name }}"
        storage_group_name: "{{ storage_group }}"
        state: attached

    - name: Get partition details
      ibm.ibm_zhmc.zhmc_partition:
        hmc_host: "{{ inventory_hostname }}"
        hmc_auth: "{{ hmc_auth }}"
        cpc_name: "{{ cpc_name }}"
        name: "{{ lpar_name }}"
        state: facts
        expand_storage_groups: true
      register: lpar_info

    - name: Extract storage group
      set_fact:
        target_sg: "{{ lpar_info.partition['storage-groups']
                      | selectattr('name','equalto', storage_group)
                      | list | first }}"

    - name: Extract device numbers
      set_fact:
        devnums: "{{ target_sg['virtual-storage-resources']
                     | map(attribute='device-number')
                     | sort
                     | list }}"

    - debug:
        msg: "FCP devices attached: {{ devnums }}"
#################################################
# STEP 2 — Configure Linux host
#################################################

- name: Configure FCP adapters and discover disks
  hosts: linux_host
  become: yes
  gather_facts: no

  tasks:

    - name: Remove devices from cio_ignore
      shell: cio_ignore -r {{ item }}
      loop: "{{ hostvars[groups['my_hmc_list'][0]].devnums }}"

    - name: Detect offline CHPIDs
      shell: lschp | awk '$3==0 {print $1}' | sed 's/0.//'
      register: chpids

    - debug:
        msg: "Offline CHPIDs: {{ chpids.stdout_lines }}"

    - name: Bring CHPIDs online
      shell: chchp -c 1 {{ item }}
      loop: "{{ chpids.stdout_lines }}"
      when: chpids.stdout_lines | length > 0

    - name: Enable devices
      shell: chzdev -e zfcp-host {{ item }}
      loop: "{{ hostvars[groups['my_hmc_list'][0]].devnums }}"

    - name: Rescan SCSI
      shell: |
        for host in /sys/class/scsi_host/host*; do
          echo "- - -" > $host/scan
        done

    - name: Wait for multipath devices
      pause:
        seconds: 5

    - name: Show multipath devices
      command: multipath -ll
      register: mp

    - debug:
        var: mp.stdout_lines
